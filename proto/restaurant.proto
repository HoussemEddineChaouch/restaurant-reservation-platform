syntax = "proto3";

package restaurant;

// Restaurant service definition
service RestaurantService {
  rpc CreateRestaurant (CreateRestaurantRequest) returns (CreateRestaurantResponse);
  rpc GetRestaurant    (GetRestaurantRequest)    returns (GetRestaurantResponse);
  rpc ListRestaurants  (ListRestaurantsRequest)  returns (ListRestaurantsResponse);
  rpc UpdateRestaurant (UpdateRestaurantRequest) returns (UpdateRestaurantResponse);
  rpc DeleteRestaurant (DeleteRestaurantRequest) returns (DeleteRestaurantResponse);

  rpc AddTable         (AddTableRequest)         returns (AddTableResponse);
  rpc GetAvailableTables (GetAvailableTablesRequest) returns (GetAvailableTablesResponse);
  rpc UpdateTableAvailability (UpdateTableAvailabilityRequest) returns (UpdateTableAvailabilityResponse);
}

// Restaurant messages
message CreateRestaurantRequest {
  string name     = 1;
  string address  = 2;
  string cuisine  = 3;
  string phone    = 4;
}

message CreateRestaurantResponse {
  string id      = 1;
  string name    = 2;
  string message = 3;
}

message GetRestaurantRequest {
  string id = 1;
}

message GetRestaurantResponse {
  string id      = 1;
  string name    = 2;
  string address = 3;
  string cuisine = 4;
  string phone   = 5;
}

message ListRestaurantsRequest {
  string cuisine = 1; // optional filter
}

message ListRestaurantsResponse {
  repeated RestaurantSummary restaurants = 1;
}

message RestaurantSummary {
  string id      = 1;
  string name    = 2;
  string address = 3;
  string cuisine = 4;
}

message UpdateRestaurantRequest {
  string id      = 1;
  string name    = 2;
  string address = 3;
  string cuisine = 4;
  string phone   = 5;
}

message UpdateRestaurantResponse {
  bool   success = 1;
  string message = 2;
}

message DeleteRestaurantRequest {
  string id = 1;
}

message DeleteRestaurantResponse {
  bool   success = 1;
  string message = 2;
}

// Table messages 
message AddTableRequest {
  string restaurant_id = 1;
  int32  capacity      = 2;
  string label         = 3; // e.g. "Table A1"
}

message AddTableResponse {
  string id      = 1;
  string label   = 2;
  string message = 3;
}

message GetAvailableTablesRequest {
  string restaurant_id = 1;
  string date          = 2; // ISO8601 format
  int32  party_size    = 3;
}

message GetAvailableTablesResponse {
  repeated TableSummary tables = 1;
}

message TableSummary {
  string id          = 1;
  string label       = 2;
  int32  capacity    = 3;
  bool   is_available = 4;
}

message UpdateTableAvailabilityRequest {
  string table_id     = 1;
  bool   is_available = 2;
  string date         = 3;
}

message UpdateTableAvailabilityResponse {
  bool   success = 1;
  string message = 2;
}